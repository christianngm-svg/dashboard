<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --muted: #7a7870;
    --accent: #c8f060;
    --accent2: #7dd3fc;
    --accent3: #f9a8d4;
    --gym: #c8f060;
    --run: #7dd3fc;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .logo span { color: var(--accent); }
  .date-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* LAYOUT */
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* TODAY BANNER */
  .today-banner {
    margin-bottom: 2.5rem;
  }
  .day-type-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 1rem;
  }
  .pill-gym { background: rgba(200,240,96,0.12); color: var(--gym); border: 1px solid rgba(200,240,96,0.25); }
  .pill-run { background: rgba(125,211,252,0.12); color: var(--run); border: 1px solid rgba(125,211,252,0.25); }
  .pill-rest { background: rgba(120,113,108,0.12); color: var(--muted); border: 1px solid rgba(120,113,108,0.2); }

  .today-title {
    font-size: 2.2rem;
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 0.4rem;
    letter-spacing: -0.02em;
  }
  .today-sub {
    font-size: 14px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* PROGRESS BAR */
  .progress-wrap {
    margin: 1.5rem 0;
    background: var(--surface2);
    border-radius: 999px;
    height: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
  }

  /* EXERCISE LIST */
  .exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2.5rem; }

  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .ex-card:hover { border-color: var(--border2); }
  .ex-card.done {
    background: rgba(200,240,96,0.04);
    border-color: rgba(200,240,96,0.2);
  }

  .ex-check {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
    transition: all 0.2s;
    font-size: 12px;
  }
  .ex-card.done .ex-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0f;
  }

  .ex-body { flex: 1; }
  .ex-name {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 6px;
    transition: color 0.2s;
  }
  .ex-card.done .ex-name { color: var(--muted); text-decoration: line-through; }

  .ex-sets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .set-tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .set-tag.editable { cursor: pointer; }
  .set-tag.editable:hover { border-color: var(--border2); color: var(--text); }

  /* EDIT MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 1.75rem;
    width: 90%;
    max-width: 420px;
    transform: translateY(8px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 1.25rem;
  }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .field label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .field input::-webkit-outer-spin-button,
  .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn { padding: 9px 20px; border-radius: 8px; border: none; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-ghost { background: var(--surface2); color: var(--muted); }
  .btn-ghost:hover { color: var(--text); }
  .btn-accent { background: var(--accent); color: #0e0e0f; }
  .btn-accent:hover { opacity: 0.85; }

  /* RUN CARD */
  .run-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .run-type {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--run);
    margin-bottom: 0.5rem;
  }
  .run-details { color: var(--muted); font-size: 14px; line-height: 1.7; }
  .strava-note {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    display: flex; align-items: center; gap: 8px;
  }
  .strava-dot { width: 6px; height: 6px; border-radius: 50%; background: #fc4c02; display: inline-block; }

  /* STATS SECTION */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 2.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-val.run-val { color: var(--run); }
  .stat-lbl { font-size: 12px; color: var(--muted); }

  /* CHART */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 2.5rem;
  }

  /* WEEK STRIP */
  .week-strip {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 2.5rem;
  }
  .day-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    transition: all 0.15s;
  }
  .day-cell .day-abbr { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .day-cell .day-icon { font-size: 15px; }
  .day-cell.gym-done { background: rgba(200,240,96,0.08); border-color: rgba(200,240,96,0.3); color: var(--gym); }
  .day-cell.run-done { background: rgba(125,211,252,0.08); border-color: rgba(125,211,252,0.3); color: var(--run); }
  .day-cell.today { border-color: var(--border2); color: var(--text); box-shadow: 0 0 0 1px rgba(255,255,255,0.08); }

  /* SWAP BUTTON & MENU */
  .swap-btn {
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .swap-btn:hover, .swap-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,0.08); }

  .swap-menu {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 0.5rem;
    margin-bottom: 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .swap-option {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex; flex-direction: column; gap: 2px;
  }
  .swap-option:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
  .swap-option.current { border-color: rgba(200,240,96,0.3); color: var(--accent); background: rgba(200,240,96,0.06); }
  .swap-option .opt-type { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .swap-option.current .opt-type { color: rgba(200,240,96,0.6); }
  .swap-divider { grid-column: 1/-1; border: none; border-top: 1px solid var(--border); margin: 2px 0; }

  /* NAV ARROWS */
  .nav-arrow {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    line-height: 1;
  }
  .nav-arrow:hover { border-color: var(--accent); color: var(--accent); }

  /* EX ACTIONS (reorder/delete) */
  .ex-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    margin-left: auto;
  }
  .ex-action-btn {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .ex-action-btn:hover { border-color: var(--border2); color: var(--text); }
  .ex-action-btn.del:hover { border-color: rgba(249,168,212,0.4); color: var(--accent3); }

  /* ADD EXERCISE */
  .add-ex-row {
    display: flex; gap: 8px; margin-top: 4px;
  }
  .add-ex-row input {
    flex: 1;
    background: var(--surface);
    border: 1px dashed var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-ex-row input:focus { border-color: var(--accent); border-style: solid; }
  .add-ex-row input::placeholder { color: var(--muted); }
  .add-ex-btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .add-ex-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* RESET BTN */
  .reset-wrap { text-align: right; margin-top: 2rem; }
  .btn-ghost-sm {
    padding: 6px 14px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .btn-ghost-sm:hover { border-color: var(--border2); color: var(--text); }

  @media (max-width: 600px) {
    header { padding: 1rem 1rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .today-title { font-size: 1.7rem; }
    .modal-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">training<span>.</span>log</div>
  <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
    <div class="date-badge" id="header-date"></div>
    <div id="sync-status" style="font-family:var(--mono); font-size:10px; letter-spacing:0.06em; color:var(--muted);">○ conectando…</div>
  </div>
</header>

<main>
  <!-- TODAY -->
  <div class="today-banner">
    <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; flex-wrap:wrap;">
      <button class="nav-arrow" onclick="navigateDay(-1)" title="Día anterior">←</button>
      <div id="day-pill" class="day-type-pill" style="margin-bottom:0;"></div>
      <button class="nav-arrow" onclick="navigateDay(1)" title="Día siguiente">→</button>
      <button class="swap-btn" onclick="toggleSwapMenu()" id="swap-btn" title="Cambiar rutina del día">⇄ cambiar</button>
    </div>
    <div id="swap-menu" class="swap-menu" style="display:none;"></div>
    <div class="today-title" id="today-title"></div>
    <div class="today-sub" id="today-sub"></div>
  </div>

  <!-- CONTENT AREA -->
  <div id="content-area"></div>

  <!-- DIVIDER -->
  <div style="border-top: 1px solid var(--border); margin: 2.5rem 0;"></div>

  <!-- STATS -->
  <div class="section-label">Esta semana</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="stat-gym">0</div><div class="stat-lbl">días gym</div></div>
    <div class="stat-card"><div class="stat-val run-val" id="stat-run">0</div><div class="stat-lbl">días corriendo</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-ex">0</div><div class="stat-lbl">ejercicios hechos</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">racha (días)</div></div>
  </div>

  <!-- WEEK VISUAL -->
  <div class="section-label">Semana actual</div>
  <div class="week-strip" id="week-strip"></div>

  <!-- CHART -->
  <div class="section-label">Días de ejercicio esta semana</div>
  <div class="chart-wrap">
    <div style="position: relative; height: 180px;">
      <canvas id="gymChart" role="img" aria-label="Gráfica de días de gym por semana"></canvas>
    </div>
  </div>

  <!-- PROGRESIÓN HISTÓRICA -->
  <div id="progress-section" style="margin-bottom:2rem;">
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; color:var(--muted); font-size:13px; font-family:var(--mono);">
      Cargando datos de Sheets…
    </div>
  </div>

  <div class="reset-wrap">
    <button class="btn-ghost-sm" onclick="resetDay()">limpiar día →</button>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">Editar ejercicio</h3>
    <div style="margin-bottom:1rem;">
      <div class="field">
        <label>Nombre</label>
        <input type="text" id="inp-name" style="width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-family:var(--sans); font-size:14px; padding:10px 12px; outline:none;">
      </div>
    </div>
    <div class="modal-grid">
      <div class="field">
        <label>Reps</label>
        <input type="number" id="inp-reps" min="1" max="100">
      </div>
      <div class="field">
        <label>Peso (lb/kg)</label>
        <input type="number" id="inp-weight" min="0" max="999">
      </div>
      <div class="field">
        <label>Series</label>
        <input type="number" id="inp-sets" min="1" max="20">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<script>

const DAY_NAMES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DAY_ABBR  = ['dom','lun','mar','mié','jue','vie','sáb'];

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxtYo8-QTWWFO6nOqZZG1-yP4RfzUpgVqtUPNw1VwUAfgbV9awmdRlOeUM59JceWoN16Q/exec';

// ─── STATE ───────────────────────────────────────────────────────────────────
function getState() {
  try { return JSON.parse(localStorage.getItem('tlState') || '{}'); } catch { return {}; }
}
function saveState(s) { localStorage.setItem('tlState', JSON.stringify(s)); }
function getWeights() {
  try { return JSON.parse(localStorage.getItem('tlWeights') || '{}'); } catch { return {}; }
}
function saveWeights(w) { localStorage.setItem('tlWeights', JSON.stringify(w)); }
function getCustomExercises() {
  try { return JSON.parse(localStorage.getItem('tlCustomEx') || '{}'); } catch { return {}; }
}
function saveCustomExercises(c) { localStorage.setItem('tlCustomEx', JSON.stringify(c)); }

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

let editIdx = null;
let currentExercises = [];
let sheetsData = [];
let viewingDow = new Date().getDay();
let viewingDate = new Date();

// Overrides de rutina por fecha (cuando el usuario cambia la rutina de un día)
function getDayOverrides() {
  try { return JSON.parse(localStorage.getItem('tlDayOverrides') || '{}'); } catch { return {}; }
}
function saveDayOverrides(o) { localStorage.setItem('tlDayOverrides', JSON.stringify(o)); }

// Rutina efectiva para una fecha/dow (considera overrides)
function getEffectiveRoutine(dow, dateKey) {
  const overrides = getDayOverrides();
  if (overrides[dateKey] !== undefined) {
    return ROUTINE[overrides[dateKey]];
  }
  return ROUTINE[dow];
}
function getEffectiveDow(dow, dateKey) {
  const overrides = getDayOverrides();
  return overrides[dateKey] !== undefined ? overrides[dateKey] : dow;
}

// ─── SWAP MENU ────────────────────────────────────────────────────────────────
const ROUTINE_LABELS = {
  1: { name: 'Upper 1', type: 'gym' },
  2: { name: 'Easy Run', type: 'run' },
  3: { name: 'Lower 1', type: 'gym' },
  4: { name: 'Intervalos', type: 'run' },
  5: { name: 'Upper 2', type: 'gym' },
  6: { name: 'Lower 2', type: 'gym' },
  0: { name: 'Long Run', type: 'run' },
};

function toggleSwapMenu() {
  const menu = document.getElementById('swap-menu');
  const btn = document.getElementById('swap-btn');
  const isOpen = menu.style.display !== 'none';
  if (isOpen) {
    menu.style.display = 'none';
    btn.classList.remove('active');
  } else {
    buildSwapMenu();
    menu.style.display = 'grid';
    btn.classList.add('active');
  }
}

function buildSwapMenu() {
  const menu = document.getElementById('swap-menu');
  const dateKey = getDateKey(viewingDate);
  const effectiveDow = getEffectiveDow(viewingDow, dateKey);
  const overrides = getDayOverrides();
  const isOverridden = overrides[dateKey] !== undefined;

  const gymOptions = [1, 3, 5, 6];
  const runOptions = [2, 4, 0];

  let html = '';
  gymOptions.forEach(dow => {
    const isCurrent = effectiveDow === dow;
    html += `<button class="swap-option${isCurrent ? ' current' : ''}" onclick="applySwap(${dow})">
      <span class="opt-type">🏋 Gym</span>
      <span>${ROUTINE_LABELS[dow].name}</span>
    </button>`;
  });
  html += '<hr class="swap-divider">';
  runOptions.forEach(dow => {
    const isCurrent = effectiveDow === dow;
    html += `<button class="swap-option${isCurrent ? ' current' : ''}" onclick="applySwap(${dow})">
      <span class="opt-type">🏃 Correr</span>
      <span>${ROUTINE_LABELS[dow].name}</span>
    </button>`;
  });
  if (isOverridden) {
    html += `<hr class="swap-divider">
    <button class="swap-option" style="grid-column:1/-1; color:var(--accent3); border-color:rgba(249,168,212,0.2);" onclick="clearSwap()">
      ↺ restaurar rutina original
    </button>`;
  }
  menu.innerHTML = html;
}

function applySwap(targetDow) {
  const dateKey = getDateKey(viewingDate);
  const overrides = getDayOverrides();
  overrides[dateKey] = targetDow;
  saveDayOverrides(overrides);
  document.getElementById('swap-menu').style.display = 'none';
  document.getElementById('swap-btn').classList.remove('active');
  renderDay();
}

function clearSwap() {
  const dateKey = getDateKey(viewingDate);
  const overrides = getDayOverrides();
  delete overrides[dateKey];
  saveDayOverrides(overrides);
  document.getElementById('swap-menu').style.display = 'none';
  document.getElementById('swap-btn').classList.remove('active');
  renderDay();
}

// ─── NAVEGACIÓN DE DÍAS ───────────────────────────────────────────────────────
function navigateDay(delta) {
  viewingDate = new Date(viewingDate);
  viewingDate.setDate(viewingDate.getDate() + delta);
  viewingDow = viewingDate.getDay();
  renderDay();
}

function renderDay() {
  const isToday = getDateKey(viewingDate) === getTodayKey();
  const dateKey = getDateKey(viewingDate);
  const effectiveDow = getEffectiveDow(viewingDow, dateKey);
  const routine = getEffectiveRoutine(viewingDow, dateKey);
  const state = getState();
  const overrides = getDayOverrides();
  const isOverridden = overrides[dateKey] !== undefined;

  const dateLabel = viewingDate.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('header-date').textContent = isToday ? dateLabel + ' · hoy' : dateLabel;

  const pill = document.getElementById('day-pill');
  if (routine.type === 'gym') {
    pill.className = 'day-type-pill pill-gym';
    pill.textContent = isOverridden ? '● Gym day ⇄' : '● Gym day';
  } else {
    pill.className = 'day-type-pill pill-run';
    pill.textContent = isOverridden ? '● Running day ⇄' : '● Running day';
  }

  document.getElementById('today-title').textContent = routine.name;
  document.getElementById('today-sub').textContent = routine.sub;

  // close swap menu if open
  const menu = document.getElementById('swap-menu');
  if (menu) menu.style.display = 'none';
  const swapBtn = document.getElementById('swap-btn');
  if (swapBtn) swapBtn.classList.remove('active');

  const area = document.getElementById('content-area');
  if (routine.type === 'gym') {
    const weights = getWeights();
    const custom = getCustomExercises();
    // use effectiveDow for custom exercises (the routine being shown)
    const baseList = custom[effectiveDow] ? custom[effectiveDow] : routine.exercises.map(e => ({...e}));
    currentExercises = baseList.map(ex => {
      const persistent = weights[ex.id];
      const todayOverride = state[dateKey]?.exercises?.[ex.id];
      const base = persistent ? { ...ex, ...persistent } : { ...ex };
      return todayOverride ? { ...base, ...todayOverride } : base;
    });
    const done = state[dateKey]?.done || {};
    renderExercises(area, done, dateKey);
  } else {
    renderRun(area, routine);
  }

  renderWeekStrip(state, new Date().getDay(), new Date());
  renderStats(state, new Date());
  renderChart(state, new Date());
}

// ─── GOOGLE SHEETS ────────────────────────────────────────────────────────────
// Manda cada fila como GET para evitar CORS (Apps Script acepta GET sin restricciones)
async function pushToSheets(rows) {
  try {
    const promises = rows.map(row => {
      const params = new URLSearchParams({
        action: 'append',
        fecha:      row.fecha,
        dia:        row.dia,
        ejercicio:  row.ejercicio,
        reps:       row.reps,
        peso:       row.peso ?? '',
        series:     row.series,
        completado: row.completado ? '1' : '0'
      });
      return fetch(`${SHEETS_URL}?${params.toString()}`)
        .then(r => r.json())
        .catch(() => null);
    });
    await Promise.all(promises);
    return true;
  } catch(e) {
    console.warn('Sheets push failed:', e);
    return false;
  }
}

async function fetchFromSheets() {
  try {
    const res = await fetch(SHEETS_URL + '?action=read&t=' + Date.now());
    const raw = await res.json();
    return raw.slice(1).map(r => ({
      fecha: r[0], dia: r[1], ejercicio: r[2],
      reps: Number(r[3]), peso: r[4] === '' ? null : Number(r[4]),
      series: Number(r[5]), completado: r[6] === true || r[6] === 'TRUE' || r[6] === '1'
    }));
  } catch(e) { return []; }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  viewingDow = new Date().getDay();
  viewingDate = new Date();
  renderDay();
  updateSyncStatus('syncing');
  sheetsData = await fetchFromSheets();
  if (sheetsData.length > 0) { updateSyncStatus('ok'); renderProgressSection(sheetsData); }
  else { updateSyncStatus('offline'); renderProgressSection([]); }
}

function updateSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = { syncing: ['#7a7870','⟳ sincronizando…'], ok: ['#c8f060','● sheets conectado'], offline: ['#7a7870','○ sin datos aún'] };
  const [color, text] = map[status];
  el.style.color = color; el.textContent = text;
}

// ─── RENDER EXERCISES ─────────────────────────────────────────────────────────
function renderExercises(area, done, dateKey) {
  if (!dateKey) dateKey = getDateKey(viewingDate);
  const total = currentExercises.length;
  const doneCount = Object.values(done).filter(Boolean).length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;

  area.innerHTML = `
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label"><span>${doneCount}/${total} ejercicios</span><span>${pct}%</span></div>
    <div class="exercise-list" id="ex-list"></div>
    <div class="add-ex-row">
      <input type="text" id="new-ex-name" placeholder="+ agregar ejercicio…" onkeydown="if(event.key==='Enter')addExercise()">
      <button class="add-ex-btn" onclick="addExercise()">agregar</button>
    </div>
    <div style="margin-top:1rem; display:flex; justify-content:flex-end;">
      <button class="btn-ghost-sm" onclick="finishSession()" id="btn-finish" style="color:var(--accent); border-color:rgba(200,240,96,0.3);">guardar sesión en sheets →</button>
    </div>
  `;

  const list = document.getElementById('ex-list');
  currentExercises.forEach((ex, i) => {
    const isDone = done[ex.id] || false;
    const wLabel = (ex.weight !== null && ex.weight !== undefined) ? ex.weight : '—';
    const card = document.createElement('div');
    card.className = `ex-card${isDone ? ' done' : ''}`;
    card.innerHTML = `
      <div class="ex-check">${isDone ? '✓' : ''}</div>
      <div class="ex-body">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-sets">
          <span class="set-tag editable" onclick="openEdit(event,${i},'reps')" title="editar">${ex.reps} reps</span>
          <span class="set-tag editable" onclick="openEdit(event,${i},'weight')" title="editar">${wLabel} lb</span>
          <span class="set-tag editable" onclick="openEdit(event,${i},'sets')" title="editar">${ex.sets} series</span>
        </div>
      </div>
      <div class="ex-actions" onclick="event.stopPropagation()">
        <button class="ex-action-btn" onclick="moveEx(${i},-1)" ${i===0?'style="opacity:0.25;pointer-events:none"':''}>↑</button>
        <button class="ex-action-btn" onclick="moveEx(${i},1)" ${i===currentExercises.length-1?'style="opacity:0.25;pointer-events:none"':''}>↓</button>
        <button class="ex-action-btn del" onclick="deleteEx(${i})">✕</button>
      </div>
    `;
    card.addEventListener('click', e => {
      if (e.target.classList.contains('editable') || e.target.closest('.ex-actions')) return;
      toggleDone(i);
    });
    list.appendChild(card);
  });
}

// ─── TOGGLE DONE ─────────────────────────────────────────────────────────────
function toggleDone(idx) {
  const ex = currentExercises[idx];
  const dateKey = getDateKey(viewingDate);
  const state = getState();
  if (!state[dateKey]) state[dateKey] = { done: {}, exercises: {} };
  state[dateKey].done[ex.id] = !state[dateKey].done[ex.id];
  state[dateKey].gymDone = Object.values(state[dateKey].done).some(Boolean);
  saveState(state);
  renderExercises(document.getElementById('content-area'), state[dateKey].done, dateKey);
  renderStats(state, new Date());
  renderChart(state, new Date());
  renderWeekStrip(state, new Date().getDay(), new Date());
}

// ─── ADD / DELETE / REORDER ───────────────────────────────────────────────────
function addExercise() {
  const inp = document.getElementById('new-ex-name');
  const name = inp.value.trim();
  if (!name) return;
  currentExercises.push({ id: 'custom_' + Date.now(), name, reps: 10, weight: null, sets: 4 });
  saveCurrentOrder();
  inp.value = '';
  const state = getState();
  renderExercises(document.getElementById('content-area'), state[getDateKey(viewingDate)]?.done || {});
}

function deleteEx(idx) {
  if (!confirm(`¿Eliminar "${currentExercises[idx].name}"?`)) return;
  currentExercises.splice(idx, 1);
  saveCurrentOrder();
  const state = getState();
  renderExercises(document.getElementById('content-area'), state[getDateKey(viewingDate)]?.done || {});
}

function moveEx(idx, delta) {
  const target = idx + delta;
  if (target < 0 || target >= currentExercises.length) return;
  [currentExercises[idx], currentExercises[target]] = [currentExercises[target], currentExercises[idx]];
  saveCurrentOrder();
  const state = getState();
  renderExercises(document.getElementById('content-area'), state[getDateKey(viewingDate)]?.done || {});
}

function saveCurrentOrder() {
  const custom = getCustomExercises();
  const effectiveDow = getEffectiveDow(viewingDow, getDateKey(viewingDate));
  custom[effectiveDow] = currentExercises.map(ex => ({ id: ex.id, name: ex.name, reps: ex.reps, weight: ex.weight, sets: ex.sets }));
  saveCustomExercises(custom);
}

// ─── GUARDAR SESIÓN EN SHEETS ─────────────────────────────────────────────────
async function finishSession() {
  const btn = document.getElementById('btn-finish');
  const state = getState();
  const dateKey = getDateKey(viewingDate);
  const done = state[dateKey]?.done || {};
  const rows = currentExercises.map(ex => ({
    fecha: dateKey, dia: DAY_NAMES[viewingDow], ejercicio: ex.name,
    reps: ex.reps, peso: ex.weight ?? '', series: ex.sets, completado: done[ex.id] ? true : false
  }));
  if (btn) { btn.textContent = 'guardando…'; btn.disabled = true; }
  await pushToSheets(rows);
  if (btn) { btn.textContent = '✓ guardado'; }
  sheetsData = await fetchFromSheets();
  if (sheetsData.length > 0) { updateSyncStatus('ok'); renderProgressSection(sheetsData); }
}

// ─── EDIT MODAL ───────────────────────────────────────────────────────────────
function openEdit(e, idx, field) {
  e.stopPropagation();
  editIdx = idx;
  const ex = currentExercises[idx];
  document.getElementById('modal-title').textContent = 'Editar ejercicio';
  document.getElementById('inp-name').value = ex.name;
  document.getElementById('inp-reps').value = ex.reps;
  document.getElementById('inp-weight').value = ex.weight ?? '';
  document.getElementById('inp-sets').value = ex.sets;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => {
    const map = { reps: 'inp-reps', weight: 'inp-weight', sets: 'inp-sets' };
    document.getElementById(map[field] || 'inp-weight')?.select();
  }, 100);
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  editIdx = null;
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal').classList.remove('open'); });

function saveEdit() {
  const name   = document.getElementById('inp-name').value.trim() || currentExercises[editIdx].name;
  const reps   = parseInt(document.getElementById('inp-reps').value) || currentExercises[editIdx].reps;
  const weight = parseFloat(document.getElementById('inp-weight').value);
  const sets   = parseInt(document.getElementById('inp-sets').value) || currentExercises[editIdx].sets;
  const ex = currentExercises[editIdx];
  ex.name = name; ex.reps = reps; ex.weight = isNaN(weight) ? null : weight; ex.sets = sets;

  const dateKey = getDateKey(viewingDate);
  const state = getState();
  if (!state[dateKey]) state[dateKey] = { done: {}, exercises: {} };
  state[dateKey].exercises[ex.id] = { reps, weight: ex.weight, sets };
  saveState(state);

  const weights = getWeights();
  weights[ex.id] = { reps, weight: ex.weight, sets };
  saveWeights(weights);
  saveCurrentOrder();

  document.getElementById('modal').classList.remove('open');
  editIdx = null;
  renderExercises(document.getElementById('content-area'), state[dateKey].done || {}, dateKey);
}

// ─── WEEK STRIP ───────────────────────────────────────────────────────────────
function renderWeekStrip(state, todayDow, now) {
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const dow = i % 7;
    const d = new Date(now);
    d.setDate(now.getDate() - ((now.getDay() - dow + 7) % 7));
    if (d > now) d.setDate(d.getDate() - 7);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const routine = ROUTINE[dow];
    const dayState = state[key] || {};
    const isToday = dow === todayDow && d.toDateString() === now.toDateString();
    let cls = 'day-cell';
    if (dayState.gymDone) cls += ' gym-done';
    else if (dayState.runDone) cls += ' run-done';
    if (isToday) cls += ' today';
    const icon = dayState.gymDone ? '🏋' : dayState.runDone ? '🏃' : (routine.type === 'gym' ? '◇' : '○');
    strip.innerHTML += `<div class="${cls}"><span class="day-abbr">${['dom','lun','mar','mié','jue','vie','sáb'][dow]}</span><span class="day-icon">${icon}</span></div>`;
  }
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats(state, now) {
  let gymDays = 0, runDays = 0, totalEx = 0, streak = 0;
  for (let offset = 0; offset < 7; offset++) {
    const d = new Date(now); d.setDate(now.getDate() - offset);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const s = state[key] || {};
    if (s.gymDone) gymDays++;
    if (s.runDone) runDays++;
    if (s.gymDone || s.runDone) streak++;
    else if (offset > 0) break;
    if (s.done) totalEx += Object.values(s.done).filter(Boolean).length;
  }
  document.getElementById('stat-gym').textContent = gymDays;
  document.getElementById('stat-run').textContent = runDays;
  document.getElementById('stat-ex').textContent = totalEx;
  document.getElementById('stat-streak').textContent = streak;
}

// ─── WEEKLY CHART ─────────────────────────────────────────────────────────────
let gymChartInst = null;
function renderChart(state, now) {
  // Encontrar el lunes de esta semana
  const monday = new Date(now);
  const dow = now.getDay(); // 0=dom,1=lun...
  const diffToMonday = (dow === 0) ? -6 : 1 - dow;
  monday.setDate(now.getDate() + diffToMonday);
  monday.setHours(0,0,0,0);

  const labels = [];
  const data = [];
  const colors = [];

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const key = getDateKey(d);
    const s = state[key] || {};
    const isPast = d <= now;
    const isToday = key === getTodayKey();

    labels.push(['lun','mar','mié','jue','vie','sáb','dom'][i]);

    if (s.gymDone) {
      data.push(1);
      colors.push(isToday ? '#c8f060' : 'rgba(200,240,96,0.6)');
    } else if (s.runDone) {
      data.push(1);
      colors.push(isToday ? '#7dd3fc' : 'rgba(125,211,252,0.6)');
    } else {
      data.push(isPast ? 0.08 : 0.04); // barra fantasma para días sin actividad / futuros
      colors.push(isPast ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)');
    }
  }

  const ctx = document.getElementById('gymChart').getContext('2d');
  if (gymChartInst) gymChartInst.destroy();

  gymChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor: colors.map(c => c),
        borderWidth: 0,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const d = new Date(monday);
              d.setDate(monday.getDate() + ctx.dataIndex);
              const key = getDateKey(d);
              const s = state[key] || {};
              if (s.gymDone) return 'Gym ✓';
              if (s.runDone) return 'Correr ✓';
              return 'Sin actividad';
            }
          }
        }
      },
      scales: {
        y: {
          min: 0, max: 1.2,
          display: false,
        },
        x: {
          ticks: {
            color: (ctx) => {
              const d = new Date(monday);
              d.setDate(monday.getDate() + ctx.index);
              return getDateKey(d) === getTodayKey() ? '#f0ede8' : '#7a7870';
            },
            font: { size: 12 }
          },
          grid: { display: false },
          border: { display: false }
        }
      }
    }
  });
}

// ─── PROGRESSION SECTION ──────────────────────────────────────────────────────
let progChartInst = null;
let selectedExercise = null;

function renderProgressSection(data) {
  const section = document.getElementById('progress-section');
  if (!section) return;

  if (!data || data.length === 0) { section.innerHTML = ""; return; }

  // Obtener ejercicios únicos que tengan al menos un peso registrado
  const withWeight = data.filter(r => r.completado && r.peso !== null && r.peso !== '');
  const exercises = [...new Set(withWeight.map(r => r.ejercicio))].sort();

  if (exercises.length === 0) { section.innerHTML = ""; return; }

  if (!selectedExercise || !exercises.includes(selectedExercise)) {
    selectedExercise = exercises[0];
  }

  const options = exercises.map(ex =>
    `<option value="${ex}" ${ex === selectedExercise ? 'selected' : ''}>${ex}</option>`
  ).join('');

  section.innerHTML = `
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:1rem;">
      <select id="ex-selector" onchange="changeExercise(this.value)"
        style="flex:1; background:var(--surface); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-family:var(--mono); font-size:12px; padding:8px 12px; outline:none;">
        ${options}
      </select>
    </div>
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-bottom:1rem;">
      <div style="position:relative; height:200px;">
        <canvas id="progChart" role="img" aria-label="Progresión de peso por ejercicio"></canvas>
      </div>
    </div>
  `;

  drawProgressChart(data, selectedExercise);
}

function changeExercise(val) {
  selectedExercise = val;
  drawProgressChart(sheetsData, val);
}

function drawProgressChart(data, ejercicio) {
  const rows = data
    .filter(r => r.ejercicio === ejercicio && r.completado && r.peso !== null && r.peso !== '')
    .sort((a, b) => a.fecha > b.fecha ? 1 : -1);

  // Agrupar por fecha: tomar el peso máximo del día
  const byDate = {};
  rows.forEach(r => {
    if (!byDate[r.fecha] || r.peso > byDate[r.fecha]) byDate[r.fecha] = r.peso;
  });
  const labels = Object.keys(byDate).sort();
  const pesos  = labels.map(l => byDate[l]);

  if (labels.length === 0) return;

  const ctx = document.getElementById('progChart');
  if (!ctx) return;
  if (progChartInst) progChartInst.destroy();

  progChartInst = new Chart(ctx.getContext('2d'), {
    type: 'line',
    data: {
      labels: labels.map(l => {
        const [y,m,d] = l.split('-');
        return new Date(y,m-1,d).toLocaleDateString('es-MX', { day:'numeric', month:'short' });
      }),
      datasets: [{
        data: pesos,
        borderColor: '#c8f060',
        backgroundColor: 'rgba(200,240,96,0.08)',
        pointBackgroundColor: '#c8f060',
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => `${ctx.parsed.y} lb` }
      }},
      scales: {
        y: { ticks: { color: '#7a7870', font: { size: 11 }, callback: v => v + ' lb' }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false } },
        x: { ticks: { color: '#7a7870', font: { size: 11 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false }, border: { display: false } }
      }
    }
  });

  // mini stats
  const max = Math.max(...pesos);
  const min = Math.min(...pesos);
  const first = pesos[0];
  const last = pesos[pesos.length - 1];
  const diff = last - first;
  const diffStr = (diff >= 0 ? '+' : '') + diff + ' lb';
  const diffColor = diff > 0 ? '#c8f060' : diff < 0 ? '#f9a8d4' : '#7a7870';

  const statsEl = document.getElementById('prog-stats');
  if (statsEl) statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-val" style="font-size:20px;">${last}</div><div class="stat-lbl">último peso (lb)</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:20px;">${max}</div><div class="stat-lbl">máximo histórico</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:20px; color:${diffColor};">${diffStr}</div><div class="stat-lbl">progreso total</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:20px;">${labels.length}</div><div class="stat-lbl">sesiones</div></div>
  `;
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetDay() {
  if (!confirm('¿Limpiar el progreso de hoy?')) return;
  const state = getState();
  delete state[getTodayKey()];
  saveState(state);
  location.reload();
}

init();
</script>
